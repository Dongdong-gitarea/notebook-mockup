<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reelish — My English Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..700,30..100&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script>
if (typeof lucide === 'undefined') {
  document.write('<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"><\/script>');
}
</script>
<style>
:root,[data-theme="dark"]{
  --bg-1:#000106;--bg-2:#020514;--bg-3:#000308;
  --surface:rgba(255,255,255,.04);--surface-hover:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.16);
  --ink:#F1F5F9;--ink-2:#E2E8F0;
  --muted:#94A3B8;--muted-2:#64748B;
  --accent:#60A5FA;--accent-deep:#3B82F6;--accent-glow:#1D4ED8;
  --cyan:#22D3EE;--rose:#F43F5E;
  --popup-bg:rgba(2,5,20,.95);--grid-line:rgba(255,255,255,.012);
  --topbar-bg:rgba(0,1,6,.7);
  --bg-grad-1:rgba(59,130,246,.12);--bg-grad-2:rgba(34,211,238,.08);--bg-grad-3:rgba(29,78,216,.10);
  --brand-grad:linear-gradient(135deg,#fff 0%,#93C5FD 50%,#60A5FA 100%);
}
[data-theme="light"]{
  --bg-1:#FAFBFD;--bg-2:#F0F5FB;--bg-3:#FAFBFD;
  --surface:rgba(15,23,42,.03);--surface-hover:rgba(15,23,42,.06);
  --border:rgba(15,23,42,.08);--border-strong:rgba(15,23,42,.16);
  --ink:#0F172A;--ink-2:#1F2937;
  --muted:#64748B;--muted-2:#94A3B8;
  --accent:#3B82F6;--accent-deep:#2563EB;--accent-glow:#1E40AF;
  --cyan:#0891B2;--rose:#E11D48;
  --popup-bg:rgba(255,255,255,.97);--grid-line:rgba(15,23,42,.025);
  --topbar-bg:rgba(250,251,253,.8);
  --bg-grad-1:rgba(59,130,246,.06);--bg-grad-2:rgba(34,211,238,.04);--bg-grad-3:rgba(29,78,216,.05);
  --brand-grad:linear-gradient(135deg,#0F172A 0%,#3B82F6 50%,#1D4ED8 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter','Noto Sans TC',-apple-system,sans-serif;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, var(--bg-grad-1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, var(--bg-grad-2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 70%, var(--bg-grad-3) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
  background-attachment:fixed;color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;
  transition:background-color .3s,color .3s;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%);
}

.icon{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;flex-shrink:0}
.icon svg{width:100%;height:100%;stroke-width:1.75}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--topbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
}
.brand{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:600;letter-spacing:-.02em;cursor:pointer;
  background:var(--brand-grad);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.topbar-actions{display:flex;gap:6px;align-items:center}
.topbar-icon{
  position:relative;width:40px;height:40px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:17px;transition:all .15s;
}
.topbar-icon:hover{background:var(--surface-hover);color:var(--ink);border-color:var(--border-strong)}
.topbar-icon.active{
  color:var(--accent);background:rgba(96,165,250,.1);
  border-color:rgba(96,165,250,.4);
  box-shadow:0 0 0 1px rgba(96,165,250,.15);
}
.topbar-badge{
  position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;
  border-radius:50px;background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
  border:2px solid var(--bg-1);
}
.topbar-badge.hidden{display:none}

/* Settings panel */
.settings-wrap{position:relative}
.settings-panel{
  position:absolute;top:calc(100% + 10px);right:0;width:300px;
  background:var(--popup-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-strong);border-radius:18px;padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none;
  transition:all .2s cubic-bezier(.4,0,.2,1);z-index:30;
}
.settings-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.settings-panel::before{
  content:'';position:absolute;top:-6px;right:14px;width:12px;height:12px;
  background:var(--popup-bg);border:1px solid var(--border-strong);border-right:0;border-bottom:0;
  transform:rotate(45deg);
}
.setting-group{margin-bottom:18px}
.setting-group:last-child{margin-bottom:0}
.setting-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.setting-label .icon{font-size:11px;color:var(--accent)}
.voice-select{
  width:100%;padding:10px 32px 10px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--ink);font-family:inherit;font-size:13px;font-weight:500;
  appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path fill='%2394A3B8' d='M5 6L0 0h10z'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;
  transition:border-color .15s;
}
.voice-select:hover{border-color:var(--border-strong)}
.voice-select option{background:var(--bg-2);color:var(--ink)}
.theme-toggle{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;
}
.theme-btn{
  background:transparent;border:none;padding:9px;border-radius:7px;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;
}
.theme-btn:hover{color:var(--ink-2)}
.theme-btn.active{
  background:var(--surface-hover);color:var(--ink);
  box-shadow:inset 0 0 0 1px var(--border-strong);
}
.theme-btn .icon{font-size:14px}

.demo-tag{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(34,211,238,.08);color:var(--cyan);font-size:11px;font-weight:600;
  padding:5px 14px;border-radius:50px;border:1px solid rgba(34,211,238,.2);
  z-index:11;pointer-events:none;backdrop-filter:blur(10px);
  letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;
}
.demo-tag .icon{font-size:12px}

.wrap{max-width:760px;margin:0 auto;padding:24px 20px 220px;position:relative;z-index:1}

/* ── Main view: Empty state hero ── */
.empty-hero{
  text-align:center;padding:48px 16px 32px;
}
.empty-hero h1{
  font-family:'Fraunces',serif;
  font-size:36px;font-weight:400;letter-spacing:-.025em;line-height:1.1;
  margin-bottom:12px;color:var(--ink);
}
.empty-hero h1 em{
  font-style:italic;font-weight:300;
  background:linear-gradient(135deg,var(--accent) 0%,var(--cyan) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.empty-hero p{font-size:15px;color:var(--muted);max-width:480px;margin:0 auto;line-height:1.7}

.example-cards{margin-top:32px;display:flex;flex-direction:column;gap:10px}
.example-cards-label{
  font-size:11px;color:var(--muted);font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin-bottom:6px;text-align:left;
}
.example-cards-label .icon{color:var(--accent);font-size:13px}
.example-cards-label::after{content:'';flex:1;height:1px;background:var(--border)}
.example-card{
  background:var(--surface);
  border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;font-family:inherit;font-size:15px;font-weight:400;color:var(--ink-2);
  cursor:pointer;text-align:left;transition:all .2s;
  display:flex;align-items:center;gap:12px;
}
.example-card:hover{
  background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.35);
  transform:translateX(4px);box-shadow:0 4px 12px rgba(96,165,250,.1);
}
.example-card-arrow{color:var(--accent);flex-shrink:0;display:flex;font-size:16px;transition:transform .2s}
.example-card:hover .example-card-arrow{transform:translateX(2px)}

/* ── Feed: translation cards ── */
.feed{display:flex;flex-direction:column;gap:14px}
.feed-section-label{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;letter-spacing:-.01em;color:var(--ink);
  margin-bottom:6px;display:flex;align-items:baseline;gap:10px;
}
.feed-section-label .count{
  font-size:12px;color:var(--accent);font-weight:600;font-family:'Inter',sans-serif;
  background:rgba(96,165,250,.1);padding:3px 10px;border-radius:50px;
  border:1px solid rgba(96,165,250,.2);letter-spacing:.04em;
}
.feed-section-label .view-all{
  margin-left:auto;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;
  padding:5px 12px;border-radius:50px;border:1px solid var(--border);background:var(--surface);
  transition:all .15s;
}
.feed-section-label .view-all:hover{background:var(--surface-hover);border-color:rgba(96,165,250,.4)}
.feed-section-label .view-all .icon{font-size:11px}

.feed-card{
  background:linear-gradient(180deg,var(--surface) 0%,var(--surface) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:18px;padding:20px 22px 16px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;
  animation:cardIn .3s ease-out;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feed-card.new{
  border-color:rgba(96,165,250,.3);
  box-shadow:0 8px 24px rgba(0,0,0,.2),0 0 0 1px rgba(96,165,250,.15);
}
.feed-card:hover{
  border-color:var(--border-strong);
  box-shadow:0 8px 28px rgba(0,0,0,.25);
}
.feed-card-meta{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  font-size:11px;color:var(--muted-2);letter-spacing:.04em;
}
.feed-card-meta .cat{
  display:inline-flex;align-items:center;gap:4px;
  font-weight:600;color:var(--cyan);
  background:rgba(34,211,238,.08);
  padding:3px 8px;border-radius:5px;border:1px solid rgba(34,211,238,.2);
  text-transform:uppercase;letter-spacing:.04em;
}
.feed-card-meta .cat .icon{font-size:11px}
.feed-card-meta .dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.4}
.feed-card-zh{
  font-size:13px;color:var(--muted);line-height:1.55;
  margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px dashed var(--border);
}
.feed-card-en{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:500;color:var(--ink);
  line-height:1.5;letter-spacing:-.005em;margin-bottom:8px;word-wrap:break-word;
}
.feed-card-ipa{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:14px;letter-spacing:.02em}
.feed-card-actions{
  display:flex;gap:6px;align-items:center;
  border-top:1px solid var(--border);padding-top:12px;margin-top:4px;
}
.feed-card-actions .btn{
  background:transparent;border:1px solid var(--border);
  border-radius:50px;padding:9px 16px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-2);
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:all .15s;
}
.feed-card-actions .btn:hover{
  background:var(--surface-hover);border-color:var(--border-strong);color:var(--ink);
  transform:translateY(-1px);
}
.feed-card-actions .btn.saved{
  background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#10B981;
}
.feed-card-actions .btn .icon{font-size:16px}
.feed-card-actions .btn:hover .icon{color:var(--accent)}
.feed-card-actions .btn.saved:hover .icon{color:#10B981}
.feed-card-actions .spacer{flex:1}
.feed-card-actions .icon-btn{
  background:transparent;border:none;width:30px;height:30px;border-radius:50%;
  color:var(--muted-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all .15s;
}
.feed-card-actions .icon-btn:hover{background:rgba(96,165,250,.08);color:var(--accent)}
.feed-card-actions .icon-btn.danger:hover{background:rgba(244,63,94,.08);color:var(--rose)}

/* Clickable words inside feed cards */
.word{
  cursor:pointer;display:inline-block;padding:0 2px;margin:0 -1px;border-radius:4px;
  border-bottom:1px dashed transparent;transition:all .12s;
}
.word:hover{background:rgba(96,165,250,.12);border-bottom-color:var(--accent)}
.word.active{background:rgba(96,165,250,.2);border-bottom-color:var(--accent)}

/* ── Fixed bottom input bar ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  background:linear-gradient(180deg,transparent 0%,rgba(0,1,6,.5) 20%,rgba(0,1,6,.95) 60%);
  padding:24px 20px 16px;
  pointer-events:none;
}
[data-theme="light"] .bottom-bar{
  background:linear-gradient(180deg,transparent 0%,rgba(250,251,253,.5) 20%,rgba(250,251,253,.95) 60%);
}
.bottom-bar-inner{
  max-width:760px;margin:0 auto;
  background:var(--popup-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-strong);border-radius:24px;
  padding:16px 18px 14px;
  box-shadow:0 -4px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);
  pointer-events:auto;
}
.bottom-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.cat-current{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(96,165,250,.08);color:var(--accent);
  border:1px solid rgba(96,165,250,.25);border-radius:50px;
  padding:5px 8px 5px 12px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.cat-current:hover{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.4)}
.cat-current .icon{font-size:13px}
.cat-current .chev{font-size:11px;opacity:.7;color:var(--muted)}
.char-count{font-size:11px;color:var(--muted-2);letter-spacing:.02em}

.cat-popup{
  position:absolute;bottom:calc(100% + 8px);left:0;
  background:var(--popup-bg);backdrop-filter:blur(20px);
  border:1px solid var(--border-strong);border-radius:14px;padding:6px;
  box-shadow:0 -8px 24px rgba(0,0,0,.5);
  opacity:0;transform:translateY(8px) scale(.96);pointer-events:none;
  transition:all .2s;z-index:25;min-width:160px;
}
.cat-popup.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.cat-popup-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--ink-2);
  transition:all .12s;
}
.cat-popup-item:hover{background:var(--surface-hover);color:var(--ink)}
.cat-popup-item.selected{background:rgba(96,165,250,.12);color:var(--accent)}
.cat-popup-item .icon{font-size:14px;color:var(--muted)}
.cat-popup-item.selected .icon{color:var(--accent)}

.bottom-input{
  display:flex;align-items:flex-end;gap:10px;
}
.bottom-input textarea{
  flex:1;min-height:42px;max-height:160px;
  border:none;outline:none;background:transparent;resize:none;
  font-family:inherit;font-size:15px;line-height:1.5;color:var(--ink);font-weight:400;
  padding:10px 0;
}
.bottom-input textarea::placeholder{color:var(--muted-2)}
.bottom-input .btn-mic{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  background:var(--surface);color:var(--ink-2);font-size:17px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);transition:all .15s;
}
.bottom-input .btn-mic:hover{background:var(--surface-hover);color:var(--ink);border-color:var(--border-strong)}
.bottom-input .btn-mic.recording{
  background:linear-gradient(135deg,var(--rose) 0%,#E11D48 100%);color:#fff;
  border-color:transparent;animation:pulseMic 1.4s ease-in-out infinite;
}
@keyframes pulseMic{
  0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.5)}
  50%{box-shadow:0 0 0 12px rgba(244,63,94,0)}
}
.bottom-input .btn-translate{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent) 100%);color:#fff;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px -2px rgba(59,130,246,.4);transition:all .15s;
}
.bottom-input .btn-translate:hover{transform:scale(1.05);box-shadow:0 6px 16px -2px rgba(59,130,246,.5)}
.bottom-input .btn-translate:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bottom-input button svg, .bottom-input button i{pointer-events:none}

/* Bottom bar 在 sentences/words/history 隱藏 */
.bottom-bar.hidden{display:none}

/* Word popup */
.word-popup{
  position:fixed;z-index:50;
  background:var(--popup-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(96,165,250,.3);border-radius:18px;
  padding:18px 20px 16px;min-width:280px;max-width:340px;
  box-shadow:0 20px 50px rgba(0,0,0,.6),0 0 0 1px rgba(96,165,250,.1);
  opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.word-popup.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.word-popup::before{
  content:'';position:absolute;top:-6px;left:24px;width:12px;height:12px;
  background:var(--popup-bg);border:1px solid rgba(96,165,250,.3);border-right:0;border-bottom:0;
  transform:rotate(45deg);
}
.word-pop-en{font-family:'Fraunces',serif;font-size:24px;font-weight:500;color:var(--ink);letter-spacing:-.01em;margin-bottom:4px}
.word-pop-ipa{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px;letter-spacing:.02em}
.word-pop-zh{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:14px}
.word-pop-pos{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;
  color:var(--cyan);background:rgba(34,211,238,.1);
  padding:2px 8px;border-radius:4px;margin-bottom:8px;text-transform:uppercase;
  border:1px solid rgba(34,211,238,.2);
}
.word-pop-actions{display:flex;gap:8px}
.word-pop-actions .btn-action{flex:1;justify-content:center}
.btn-action{
  background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 14px;
  font-family:inherit;font-size:12px;font-weight:500;color:var(--ink-2);
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.btn-action:hover{background:var(--surface-hover);border-color:var(--border-strong);color:var(--ink)}
.btn-action .icon{font-size:14px;color:var(--muted)}
.btn-action:hover .icon{color:var(--accent)}
.btn-action.primary{
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent) 100%);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 12px -2px rgba(59,130,246,.4);
}
.btn-action.primary .icon{color:#fff}

/* Section divider for vault pages */
.section-divider{
  display:flex;align-items:center;gap:14px;margin:24px 0 16px;padding:0 4px;
}
.section-divider .icon-wrap{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,rgba(59,130,246,.18) 0%,rgba(34,211,238,.1) 100%);
  border:1px solid rgba(96,165,250,.25);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:16px;flex-shrink:0;
}
.section-divider .label{font-family:'Fraunces',serif;font-size:24px;font-weight:500;letter-spacing:-.01em;color:var(--ink)}
.section-divider .count{
  font-size:12px;color:var(--accent);font-weight:600;
  background:rgba(96,165,250,.1);padding:3px 10px;border-radius:50px;
  border:1px solid rgba(96,165,250,.2);letter-spacing:.04em;
}
.section-divider .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%)}

.filter-tabs{
  display:flex;gap:4px;margin-bottom:14px;padding:4px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.filter-tab{
  background:transparent;border:none;padding:8px 14px;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.filter-tab:hover{color:var(--ink-2);background:var(--surface-hover)}
.filter-tab.active{
  background:linear-gradient(135deg,rgba(59,130,246,.18) 0%,rgba(34,211,238,.1) 100%);
  color:var(--ink);box-shadow:inset 0 0 0 1px rgba(96,165,250,.25);
}
.filter-tab .icon{font-size:13px}
.filter-tab .num{
  font-size:11px;font-weight:600;color:var(--muted-2);
  background:var(--surface);padding:1px 7px;border-radius:50px;
}
.filter-tab.active .num{background:rgba(96,165,250,.2);color:var(--accent)}

/* History group */
.history-group{margin-bottom:28px}
.history-group-label{
  font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--ink-2);
  margin-bottom:10px;padding:0 4px;
  display:flex;align-items:baseline;gap:8px;
}
.history-group-label .sub{font-size:11px;color:var(--muted-2);font-family:'Inter',sans-serif;font-weight:500;letter-spacing:.04em;text-transform:uppercase}

/* Empty state */
.empty-state{
  text-align:center;padding:48px 24px;color:var(--muted);
  background:var(--surface);border:1px dashed var(--border-strong);border-radius:20px;
}
.empty-state .icon-wrap{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,rgba(59,130,246,.12) 0%,rgba(34,211,238,.06) 100%);
  border:1px solid rgba(96,165,250,.18);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;color:var(--accent);font-size:20px;
}
.empty-state .title{font-family:'Fraunces',serif;font-size:17px;color:var(--ink-2);margin-bottom:6px;font-weight:500}
.empty-state .desc{font-size:13px;color:var(--muted);line-height:1.6}

/* Word vault grid */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.word-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;transition:all .2s;
}
.word-card:hover{border-color:rgba(96,165,250,.35);background:var(--surface-hover);transform:translateY(-1px)}
.word-card-en{font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:2px;letter-spacing:-.01em}
.word-card-ipa{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;letter-spacing:.02em}
.word-card-zh{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:10px}
.word-card-actions{display:flex;gap:2px;justify-content:flex-end;margin-top:6px;border-top:1px solid var(--border);padding-top:8px}
.icon-btn{
  background:transparent;border:none;width:32px;height:32px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:14px;transition:all .15s;
}
.icon-btn:hover{background:rgba(96,165,250,.1);color:var(--accent)}
.icon-btn.danger:hover{background:rgba(244,63,94,.1);color:var(--rose)}
.icon-btn.success{color:#10B981}

.loading{display:inline-flex;gap:4px;align-items:center}
.loading .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease-in-out infinite}
.loading .dot:nth-child(2){animation-delay:.16s}.loading .dot:nth-child(3){animation-delay:.32s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

.toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--popup-bg);backdrop-filter:blur(12px);
  color:var(--ink);padding:12px 22px;border-radius:50px;
  font-size:13px;font-weight:500;letter-spacing:.01em;
  border:1px solid var(--border-strong);
  opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:100;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.5);
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .icon{color:var(--accent);font-size:14px}

/* Practice modal */
.practice-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,1,6,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:none;align-items:center;justify-content:center;padding:20px;
  animation:fadeBg .2s ease-out;
}
[data-theme="light"] .practice-modal{background:rgba(15,23,42,.6)}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.practice-modal.open{display:flex}
.practice-modal-inner{
  width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  background:linear-gradient(180deg,var(--bg-2) 0%,var(--bg-3) 100%);
  border:1px solid var(--border-strong);border-radius:24px;
  padding:32px 28px;position:relative;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
  animation:modalIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--surface);color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .15s;
}
.modal-close:hover{background:var(--surface-hover);color:var(--ink)}
.practice-header{text-align:center;margin-bottom:24px;padding-top:8px}
.practice-header .label{
  display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);font-weight:700;margin-bottom:8px;
  background:rgba(96,165,250,.1);padding:4px 12px;border-radius:50px;
  border:1px solid rgba(96,165,250,.2);
}
.practice-header .step{
  display:block;font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;color:var(--ink);margin-top:10px;
}
.practice-target{
  background:linear-gradient(180deg,rgba(96,165,250,.06) 0%,rgba(34,211,238,.03) 100%);
  border:1px solid rgba(96,165,250,.2);border-radius:18px;
  padding:24px;text-align:center;margin-bottom:20px;
}
.target-en{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;color:var(--ink);
  line-height:1.5;margin-bottom:10px;letter-spacing:-.01em;
}
.target-ipa{font-size:12px;color:var(--muted);font-style:italic;letter-spacing:.02em}

.practice-listen{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  color:var(--ink-2);font-family:inherit;font-size:14px;font-weight:500;
  cursor:pointer;margin-bottom:24px;transition:all .15s;
}
.practice-listen:hover{background:var(--surface-hover);border-color:var(--border-strong);color:var(--ink)}
.practice-listen .icon{font-size:16px;color:var(--accent)}

.practice-record-area{text-align:center;padding:8px 0 16px}
.practice-mic-big{
  width:96px;height:96px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent-glow) 100%);
  color:#fff;font-size:34px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  box-shadow:0 12px 32px -8px rgba(59,130,246,.5),inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .2s;
}
.practice-mic-big:hover{transform:scale(1.05)}
.practice-mic-big.recording{
  background:linear-gradient(135deg,var(--rose) 0%,#E11D48 100%);
  animation:pulseMic 1.4s ease-in-out infinite;
}
.practice-status{font-size:14px;color:var(--muted);font-weight:500}

.practice-audio-row{
  display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;
}
.practice-audio-row .audio-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:9px 16px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-2);
  cursor:pointer;transition:all .15s;
}
.practice-audio-row .audio-btn:hover{
  background:var(--surface-hover);border-color:var(--border-strong);color:var(--ink);
  transform:translateY(-1px);
}
.practice-audio-row .audio-btn .icon{font-size:14px;color:var(--accent)}
.practice-audio-row .audio-btn.you .icon{color:var(--cyan)}
.practice-audio-row .audio-btn.compare .icon{color:#10B981}
.practice-audio-row .audio-btn.playing{
  background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.4);color:var(--accent);
}

.practice-result{
  display:none;
  background:linear-gradient(180deg,rgba(96,165,250,.06) 0%,rgba(34,211,238,.03) 100%);
  border:1px solid rgba(96,165,250,.2);border-radius:18px;
  padding:24px;margin-top:18px;text-align:center;
}
.practice-result.show{display:block;animation:slideIn .3s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.practice-score{
  font-family:'Fraunces',serif;
  font-size:72px;font-weight:600;line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--cyan) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:6px;letter-spacing:-.04em;
}
.practice-score.bad{background:linear-gradient(135deg,var(--rose) 0%,#FB923C 100%);-webkit-background-clip:text;background-clip:text}
.practice-score.mid{background:linear-gradient(135deg,#FBBF24 0%,#F59E0B 100%);-webkit-background-clip:text;background-clip:text}
.practice-score-suffix{font-size:18px;color:var(--muted);margin-left:4px;font-weight:500}
.practice-comment{font-size:15px;color:var(--ink);font-weight:500;margin-bottom:14px}
.practice-transcript{
  font-size:13px;color:var(--muted-2);
  padding:10px 14px;background:var(--surface);border-radius:10px;margin-bottom:18px;
  border:1px solid var(--border);text-align:left;
}
.practice-transcript .label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-right:6px;
}
.practice-transcript .said{color:var(--ink-2);font-style:italic}
.practice-transcript .target{display:block;margin-top:6px;font-style:normal;color:var(--ink)}
.practice-transcript .target .ok{color:var(--ink)}
.practice-transcript .target .bad{
  color:#ff6b6b;font-weight:700;text-decoration:underline;
  text-decoration-color:rgba(255,107,107,.5);text-underline-offset:3px;
}
.practice-transcript .said .bad{
  color:#ff6b6b;font-weight:600;
}
.practice-transcript .said .ok{color:var(--ink-2)}
.practice-actions{display:flex;gap:10px;justify-content:center}
.practice-actions button{
  background:var(--surface);border:1px solid var(--border);border-radius:50px;
  padding:10px 22px;color:var(--ink);font-family:inherit;font-size:13px;
  font-weight:600;cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
}
.practice-actions button:hover{background:var(--surface-hover);border-color:var(--border-strong)}
.practice-actions button.primary{
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent) 100%);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 12px -2px rgba(59,130,246,.4);
}
.practice-actions button .icon{font-size:14px}

[data-view]{display:none}
[data-view].active{display:block;animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Sentence vault item */
.saved-item{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:18px 20px;margin-bottom:10px;
  display:flex;gap:14px;align-items:flex-start;transition:all .25s;
}
.saved-item:hover{background:var(--surface-hover);border-color:rgba(96,165,250,.3);transform:translateY(-2px)}
.saved-text{flex:1;min-width:0}
.cat-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--cyan);background:rgba(34,211,238,.08);
  padding:3px 8px;border-radius:5px;border:1px solid rgba(34,211,238,.2);margin-bottom:8px;
}
.cat-badge .icon{font-size:11px}
.saved-en{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.45}
.saved-zh{font-size:13px;color:var(--muted);line-height:1.5}
.saved-meta{font-size:11px;color:var(--muted-2);margin-top:8px;display:flex;gap:10px;align-items:center}
.saved-meta .item{display:flex;align-items:center;gap:5px}
.saved-meta .icon{font-size:11px}
.saved-meta .dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.4}
.saved-actions{display:flex;gap:2px;flex-shrink:0}

@media(max-width:600px){
  .wrap{padding:16px 14px 240px}
  .empty-hero{padding:32px 8px 24px}
  .empty-hero h1{font-size:28px}
  .empty-hero p{font-size:14px}
  .feed-card{padding:16px 18px 14px;border-radius:16px}
  .feed-card-en{font-size:18px}
  .demo-tag{top:54px;right:14px;left:14px;text-align:center;transform:none;justify-content:center}
  .word-popup{min-width:240px;max-width:90vw}
  .settings-panel{width:calc(100vw - 32px);right:-8px}
  .topbar-icon{width:36px;height:36px;font-size:15px}
  .bottom-bar{padding:20px 14px 12px}
  .bottom-bar-inner{padding:14px 16px 12px;border-radius:20px}
  .feed-section-label{font-size:18px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="navigate('main')">Reelish</div>
  <div class="topbar-actions">
    <button class="topbar-icon" id="navHome" onclick="navigate('main')" title="Home">
      <i data-lucide="house"></i>
    </button>
    <button class="topbar-icon" id="navHistory" onclick="navigate('history')" title="History">
      <i data-lucide="history"></i>
    </button>
    <button class="topbar-icon" id="navSentence" onclick="navigate('sentences')" title="My Sentences">
      <i data-lucide="book-open-text"></i>
      <span class="topbar-badge hidden" id="sentenceBadge">0</span>
    </button>
    <button class="topbar-icon" id="navWord" onclick="navigate('words')" title="My Words">
      <i data-lucide="library"></i>
      <span class="topbar-badge hidden" id="wordBadge">0</span>
    </button>
    <div class="settings-wrap">
      <button class="topbar-icon" id="settingsBtn" onclick="toggleSettings(event)" title="Settings">
        <i data-lucide="settings"></i>
      </button>
      <div class="settings-panel" id="settingsPanel" onclick="event.stopPropagation()">
        <div class="setting-group">
          <div class="setting-label"><span class="icon"><i data-lucide="audio-lines"></i></span><span>Voice</span></div>
          <select id="voiceSelect" class="voice-select" onchange="onVoiceChange()"></select>
        </div>
        <div class="setting-group">
          <div class="setting-label"><span class="icon"><i data-lucide="palette"></i></span><span>Appearance</span></div>
          <div class="theme-toggle">
            <button class="theme-btn" data-theme-btn="dark" onclick="setTheme('dark')">
              <span class="icon"><i data-lucide="moon"></i></span><span>Dark</span>
            </button>
            <button class="theme-btn" data-theme-btn="light" onclick="setTheme('light')">
              <span class="icon"><i data-lucide="sun"></i></span><span>Light</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- ════ MAIN VIEW ════ -->
  <div data-view="main" class="active">
    <div id="mainContent"></div>
  </div>

  <!-- ════ HISTORY VIEW ════ -->
  <div data-view="history">
    <div class="section-divider">
      <span class="icon-wrap"><i data-lucide="history"></i></span>
      <span class="label">Translation History</span>
      <span class="count" id="historyCount">0</span>
      <div class="line"></div>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- ════ SENTENCES VIEW ════ -->
  <div data-view="sentences">
    <div class="section-divider">
      <span class="icon-wrap"><i data-lucide="book-open-text"></i></span>
      <span class="label">My Sentences</span>
      <span class="count" id="sentenceCount">0</span>
      <div class="line"></div>
    </div>
    <div class="filter-tabs" id="sentenceFilters"></div>
    <div id="sentenceList"></div>
  </div>

  <!-- ════ WORDS VIEW ════ -->
  <div data-view="words">
    <div class="section-divider">
      <span class="icon-wrap"><i data-lucide="library"></i></span>
      <span class="label">My Words</span>
      <span class="count" id="wordCount">0</span>
      <div class="line"></div>
    </div>
    <div id="wordList"></div>
  </div>

</div>

<!-- ════ FIXED BOTTOM INPUT BAR (only main view) ════ -->
<div class="bottom-bar" id="bottomBar">
  <div class="bottom-bar-inner">
    <div class="bottom-meta" style="position:relative">
      <button class="cat-current" id="catCurrentBtn" onclick="toggleCatPopup(event)">
        <span class="icon" id="catCurrentIcon"><i data-lucide="notebook"></i></span>
        <span id="catCurrentLabel">Personal</span>
        <span class="chev"><i data-lucide="chevron-down"></i></span>
      </button>
      <div class="cat-popup" id="catPopup" onclick="event.stopPropagation()"></div>
      <span class="char-count" id="charCount">0 / 500</span>
    </div>
    <div class="bottom-input">
      <textarea id="input" placeholder="寫下你想說的中文 — 工作、日記、想法都行" oninput="updateCharCount();autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();translate()}"></textarea>
      <button class="btn-mic" id="btnVoice" onclick="toggleVoice()" title="Voice input">
        <i data-lucide="mic"></i>
      </button>
      <button class="btn-translate" id="btnTrans" onclick="translate()" title="Translate (Enter)">
        <i data-lucide="arrow-up"></i>
      </button>
    </div>
  </div>
</div>

<!-- Practice modal -->
<div class="practice-modal" id="practiceModal" onclick="closePractice(event)">
  <div class="practice-modal-inner" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closePractice()"><i data-lucide="x"></i></button>
    <div class="practice-header">
      <span class="label">Practice</span>
      <span class="step" id="practiceStep">Listen, then speak</span>
    </div>
    <div class="practice-target">
      <div class="target-en" id="practiceEn"></div>
      <div class="target-ipa" id="practiceIpa"></div>
    </div>
    <button class="practice-listen" onclick="practiceListen()">
      <span class="icon"><i data-lucide="volume-2"></i></span>
      <span>Listen first</span>
    </button>
    <div class="practice-record-area">
      <button class="practice-mic-big" id="practiceMic" onclick="practiceRecord()">
        <i data-lucide="mic"></i>
      </button>
      <div class="practice-status" id="practiceStatus">Tap to record</div>
    </div>
    <div class="practice-result" id="practiceResult">
      <div><span class="practice-score" id="practiceScore">0</span><span class="practice-score-suffix">%</span></div>
      <div class="practice-comment" id="practiceComment"></div>
      <div class="practice-transcript" id="practiceTranscript"></div>
      <div class="practice-audio-row">
        <button class="audio-btn" onclick="speak(practiceTarget)">
          <span class="icon"><i data-lucide="volume-2"></i></span><span>Native</span>
        </button>
        <button class="audio-btn you" id="playYourBtn" onclick="playYourRecording()" style="display:none">
          <span class="icon"><i data-lucide="user-circle"></i></span><span>You</span>
        </button>
        <button class="audio-btn compare" id="compareBtn" onclick="playCompare()" style="display:none">

function lookupWord(word){
  const clean = word.toLowerCase().replace(/^[^a-z']+|[^a-z']+$/g,'');
  if (WORD_DEFS[clean]) return {...WORD_DEFS[clean], word:clean};
  return {ipa:'',pos:'',zh:'（mock 字典未收錄此單字 — 正式版會用 Claude AI 即時生成）',word:clean};
}
function fakeTranslate(text){
  if (MOCK_TRANSLATIONS[text]) return MOCK_TRANSLATIONS[text];
  for (const key in MOCK_TRANSLATIONS) {
    if (text.includes(key) || key.includes(text)) return MOCK_TRANSLATIONS[key];
  }
  return null;
}

// MyMemory free translation API — 5000 chars/day, no key
async function translateViaAPI(text){
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh-TW|en-US`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const en = (data.responseData && data.responseData.translatedText) || '';
    if (!en) throw new Error('Empty translation');
    return { en, ipa: '' };
  } finally {
    clearTimeout(timer);
  }
}

async function smartTranslate(text){
  const mock = fakeTranslate(text);
  if (mock) return mock;
  try {
    return await translateViaAPI(text);
  } catch (e) {
    console.warn('Translation API error:', e);
    return { en: '[' + text + '] (translation unavailable — open via http server, not file://)', ipa: '' };
  }
}

function isToday(iso){const d=new Date(iso),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()}
function isYesterday(iso){const d=new Date(iso),y=new Date();y.setDate(y.getDate()-1);return d.getFullYear()===y.getFullYear()&&d.getMonth()===y.getMonth()&&d.getDate()===y.getDate()}
function isThisWeek(iso){if(isToday(iso)||isYesterday(iso))return false;return (Date.now()-new Date(iso).getTime())/(1000*60*60*24)<7}
function isEarlier(iso){return (Date.now()-new Date(iso).getTime())/(1000*60*60*24)>=7}

function renderClickableWords(text){
  const parts = text.split(/(\s+|[.,!?;:"]+)/).filter(Boolean);
  return parts.map(p=>{
    if(/^\s+$/.test(p)) return p;
    if(/^[.,!?;:"]+$/.test(p)) return `<span style="color:var(--muted)">${escapeHtml(p)}</span>`;
    return `<span class="word" onclick="event.stopPropagation();showWordPopup(event, '${escapeJs(p)}')">${escapeHtml(p)}</span>`;
  }).join('');
}

async function translate(){
  const text = document.getElementById('input').value.trim();
  if (!text) { toast('Please enter Chinese text first'); return; }
  const btn = document.getElementById('btnTrans');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  try {
    const r = await smartTranslate(text);
    const histArr = loadHistory();
    const newItem = {
      id: Date.now(), zh: text, en: r.en, ipa: r.ipa,
      category: selectedCategory, savedAt: new Date().toISOString(), isSaved: false, isNew: true
    };
    histArr.unshift(newItem);
    saveHistoryArr(histArr.slice(0, 200));
    document.getElementById('input').value = '';
    autoResize(document.getElementById('input'));
    updateCharCount();
    renderMain();
    setTimeout(() => {
      const newCard = document.querySelector('.feed-card');

    }, 50);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="arrow-up"></i>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
}

// ── Practice mode ──
let practiceTarget = '';
let practiceRecognition = null;
let practiceIsRecording = false;
let practiceMediaRecorder = null;
let practiceAudioBlob = null;
let practiceAudioStream = null;

function openPractice(en, ipa){
  practiceTarget = en;
  document.getElementById('practiceEn').textContent = en;
  document.getElementById('practiceIpa').textContent = ipa || '';
  document.getElementById('practiceResult').classList.remove('show');
  document.getElementById('practiceStatus').textContent = 'Tap to record';
  document.getElementById('practiceMic').classList.remove('recording');
  document.getElementById('practiceMic').innerHTML = '<i data-lucide="mic"></i>';
  document.getElementById('playYourBtn').style.display = 'none';
  document.getElementById('compareBtn').style.display = 'none';
  practiceAudioBlob = null;
  document.getElementById('practiceModal').classList.add('open');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}
function closePractice(ev){
  if (ev && ev.target && !ev.target.classList.contains('practice-modal') && ev.target.tagName !== 'BUTTON' && !ev.target.closest('.modal-close')) {
    if (!ev.target.closest('.modal-close')) return;
  }
  stopPracticeRecording();
  // 釋放 audio blob URL
  if (practiceAudioBlob && practiceAudioBlob._url) {
    URL.revokeObjectURL(practiceAudioBlob._url);
  }
  practiceAudioBlob = null;
  document.getElementById('practiceModal').classList.remove('open');
}
function stopPracticeRecording(){
  if (practiceRecognition && practiceIsRecording) {
    try { practiceRecognition.stop(); } catch(e){}
  }
  if (practiceMediaRecorder && practiceMediaRecorder.state === 'recording') {
    try { practiceMediaRecorder.stop(); } catch(e){}
  }
  if (practiceAudioStream) {
    practiceAudioStream.getTracks().forEach(t => t.stop());
    practiceAudioStream = null;
  }
}
function practiceListen(){
  speak(practiceTarget);
}
async function practiceRecord(){
  if (practiceIsRecording) {
    stopPracticeRecording();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice recognition not supported (try Chrome / Safari)'); return; }

  // 1. 取 mic stream 給 MediaRecorder（要求權限）
  try {
    practiceAudioStream = await navigator.mediaDevices.getUserMedia({audio: true});
  } catch (e) {
    toast('Microphone permission denied');
    return;
  }

  // 2. MediaRecorder 開始錄音檔
  const chunks = [];
  try {
    practiceMediaRecorder = new MediaRecorder(practiceAudioStream);
    practiceMediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    practiceMediaRecorder.onstop = () => {
      if (chunks.length) {
        practiceAudioBlob = new Blob(chunks, {type: practiceMediaRecorder.mimeType || 'audio/webm'});
        practiceAudioBlob._url = URL.createObjectURL(practiceAudioBlob);
      }
      if (practiceAudioStream) {
        practiceAudioStream.getTracks().forEach(t => t.stop());
        practiceAudioStream = null;
      }
    };
    practiceMediaRecorder.start();
  } catch (e) {
    console.warn('MediaRecorder failed:', e);
    // 即使 MediaRecorder 失敗也能繼續用 SpeechRecognition
  }

  // 3. SpeechRecognition 同時跑（負責轉文字評分）
  practiceRecognition = new SR();
  practiceRecognition.lang = 'en-US';
  practiceRecognition.interimResults = false;
  practiceRecognition.continuous = false;
  practiceRecognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    // 等 MediaRecorder onstop 跑完才有 blob
    setTimeout(() => showPracticeResult(transcript), 100);
  };
  practiceRecognition.onerror = (e) => {
    if (practiceMediaRecorder && practiceMediaRecorder.state === 'recording') {
      try { practiceMediaRecorder.stop(); } catch(_){}
    }
    practiceIsRecording = false;
    document.getElementById('practiceMic').classList.remove('recording');
    document.getElementById('practiceMic').innerHTML = '<i data-lucide="mic"></i>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    document.getElementById('practiceStatus').textContent = e.error === 'no-speech' ? "Didn't hear anything — try again" : 'Try again';
  };
  practiceRecognition.onend = () => {
    if (practiceMediaRecorder && practiceMediaRecorder.state === 'recording') {
      try { practiceMediaRecorder.stop(); } catch(_){}
    }
    practiceIsRecording = false;
    document.getElementById('practiceMic').classList.remove('recording');
    document.getElementById('practiceMic').innerHTML = '<i data-lucide="mic"></i>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  };
  practiceRecognition.start();
  practiceIsRecording = true;
  document.getElementById('practiceMic').classList.add('recording');
  document.getElementById('practiceMic').innerHTML = '<i data-lucide="square"></i>';
  document.getElementById('practiceStatus').textContent = 'Listening… speak now';
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// ── 播放使用者錄音 ──
let _yourAudio = null;
function playYourRecording(){
  if (!practiceAudioBlob) { toast('No recording available'); return; }
  speechSynthesis.cancel();  // 停 native TTS
  if (_yourAudio) { _yourAudio.pause(); _yourAudio = null; }
  _yourAudio = new Audio(practiceAudioBlob._url);
  const btn = document.getElementById('playYourBtn');
  btn.classList.add('playing');
  _yourAudio.onended = () => btn.classList.remove('playing');
  _yourAudio.play();
}

// ── 連續播放：native → 您的版本 ──
function playCompare(){
  speechSynthesis.cancel();
  if (_yourAudio) { _yourAudio.pause(); _yourAudio = null; }
  const btn = document.getElementById('compareBtn');
  btn.classList.add('playing');
  // 1. 先放 native
  speak(practiceTarget);
  const u = speechSynthesis.speaking ? null : null; // dummy — real flow below
  // 用 utterance.onend 接 user recording
  // 由於 speak() 沒回傳 utterance，這裡重做一次以拿到 onend hook
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(practiceTarget);
  const selected = document.getElementById('voiceSelect').value;
  const voice = allVoices.find(v => v.name === selected);
  if (voice) { utt.voice = voice; utt.lang = voice.lang; }
  else utt.lang = 'en-US';
  utt.rate = 0.95;
  utt.onend = () => {
    if (!practiceAudioBlob) { btn.classList.remove('playing'); return; }
    setTimeout(() => {
      if (_yourAudio) _yourAudio.pause();
      _yourAudio = new Audio(practiceAudioBlob._url);
      _yourAudio.onended = () => btn.classList.remove('playing');
      _yourAudio.play();
    }, 300);
  };
  speechSynthesis.speak(utt);
}
function showPracticeResult(transcript){
  const score = scoreTexts(transcript, practiceTarget);
  const scoreEl = document.getElementById('practiceScore');
  scoreEl.textContent = score;
  scoreEl.className = 'practice-score' + (score < 50 ? ' bad' : score < 80 ? ' mid' : '');
  document.getElementById('practiceComment').textContent =
    score >= 90 ? 'Excellent! Nailed it.' :
    score >= 75 ? 'Pretty close — almost there.' :
    score >= 50 ? 'Keep practicing — listen carefully.' :
    'Try again — listen to the native pronunciation first.';
  const diff = diffPronunciation(transcript, practiceTarget);
  document.getElementById('practiceTranscript').innerHTML =
    `<span class="label">You said</span><span class="said">${diff.saidHtml}</span>` +
    `<span class="target"><span class="label">Target</span>${diff.targetHtml}</span>`;
  document.getElementById('practiceResult').classList.add('show');
  document.getElementById('practiceStatus').textContent = 'Tap to try again';
  // 顯示「You」「Compare」按鈕（如果有錄到音）
  // 給 MediaRecorder.onstop 多一點時間製作 blob
  setTimeout(() => {
    if (practiceAudioBlob) {
      document.getElementById('playYourBtn').style.display = '';
      document.getElementById('compareBtn').style.display = '';
    } else {
      // MediaRecorder 失敗（可能瀏覽器不支援），就只顯示 Native
      document.getElementById('playYourBtn').style.display = 'none';
      document.getElementById('compareBtn').style.display = 'none';
    }
  }, 400);
}
function scoreTexts(spoken, original){
  const clean = s => s.toLowerCase().replace(/[^a-z'\s]/g, '').split(/\s+/).filter(Boolean);
  const sWords = clean(spoken);
  const oWords = clean(original);
  if (oWords.length === 0) return 0;
  let matches = 0;
  // 比對：每個原文 word 在 transcript 是否出現過
  oWords.forEach(w => {
    if (sWords.includes(w)) matches++;
  });
  return Math.round((matches / oWords.length) * 100);
}

// 把單字標出對錯：保留原文標點，比對小寫單字
function diffPronunciation(spoken, original){
  const norm = w => w.toLowerCase().replace(/[^a-z']/g, '');
  const spokenSet = new Set(spoken.split(/\s+/).map(norm).filter(Boolean));
  const tokenize = text => text.split(/(\s+|[.,!?;:"]+)/).filter(Boolean);

  // Target：原文 — 用戶沒講對的單字標紅
  const targetHtml = tokenize(original).map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    if (/^[.,!?;:"]+$/.test(tok)) return escapeHtml(tok);
    const key = norm(tok);
    if (!key) return escapeHtml(tok);
    const ok = spokenSet.has(key);
    return `<span class="${ok ? 'ok' : 'bad'}">${escapeHtml(tok)}</span>`;
  }).join('');

  // You said：用戶講的 — 不在原文內的單字標紅（可能是發錯成別的字）
  const targetSet = new Set(original.split(/\s+/).map(norm).filter(Boolean));
  const saidHtml = tokenize(spoken).map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    if (/^[.,!?;:"]+$/.test(tok)) return escapeHtml(tok);
    const key = norm(tok);
    if (!key) return escapeHtml(tok);
    const ok = targetSet.has(key);
    return `<span class="${ok ? 'ok' : 'bad'}">${escapeHtml(tok)}</span>`;
  }).join('');

  return { targetHtml, saidHtml };
}

// Word popup
let currentWordData=null;
function showWordPopup(ev, wordText){
  const def = lookupWord(wordText);

  document.getElementById('popPos').style.display = def.pos ? '' : 'none';
  document.querySelectorAll('.word.active').forEach(el=>el.classList.remove('active'));
  ev.target.classList.add('active');
  const rect = ev.target.getBoundingClientRect();
  const popupW = 300;
  let left = rect.left + rect.width/2 - popupW/2;
  left = Math.max(12, Math.min(left, window.innerWidth - popupW - 12));
  let top = rect.bottom + 12;
  // 若靠近底部 bottom-bar，改顯示在 word 上方
  if (top + 200 > window.innerHeight - 140) top = rect.top - 220;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.classList.add('show');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}
function hideWordPopup(){
  document.getElementById('wordPopup').classList.remove('show');

// Voice input
let recognition=null, isRecording=false;
function toggleVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice input not supported (try Chrome / Safari)'); return; }
  const btn = document.getElementById('btnVoice');
  if (isRecording) { if (recognition) recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'zh-TW'; recognition.interimResults = true; recognition.continuous = false;
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
    document.getElementById('input').value = text;
    updateCharCount();
    autoResize(document.getElementById('input'));
  };
  recognition.onerror = (e) => { toast('Voice error: ' + e.error); resetMic(); };
  recognition.onend = () => resetMic();
  recognition.start();
  isRecording = true;
  btn.classList.add('recording');
  btn.innerHTML = '<i data-lucide="square"></i>';
  if (typeof lucide !== 'undefined') lucide.createIcons();
  toast('Listening...');
}
function resetMic(){
  isRecording = false;
  const btn = document.getElementById('btnVoice');
  btn.classList.remove('recording');
  btn.innerHTML = '<i data-lucide="mic"></i>';
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Voices
const ACCENT_LABELS = {'en-US':'US English','en-GB':'UK English','en-AU':'Australian','en-CA':'Canadian','en-IN':'Indian','en-IE':'Irish','en-ZA':'South African','en-NZ':'New Zealand'};
const GOOD_VOICES = ['samantha','alex','karen','daniel','moira','tessa','veena','fiona','ava','susan','tom','allison','victoria','kate','serena','aaron','evan','nora','noelle','isha','rishi','zoe','jamie','noah','flo','google us english','google uk english female','google uk english male','google australian','google indian english','google new zealand','microsoft zira','microsoft david','microsoft mark','microsoft eric','microsoft hazel','microsoft george','microsoft susan','microsoft jenny','microsoft aria','microsoft guy','microsoft natasha','microsoft william'];
const BAD_VOICES = ['albert','bad news','bahh','bells','boing','bubbles','cellos','deranged','good news','hysterical','junior','kathy','organ','pipe organ','princess','ralph','rocko','superstar','trinoids','vicki','whisper','zarvox','fred','agnes','grandma','grandpa','jester'];
const FEMALE_HINTS = ['samantha','karen','victoria','allison','ava','susan','tessa','fiona','veena','moira','zira','hazel','jenny','aria','natasha','female','noelle','nora','zoe','kate','serena','isha','flo'];
const MALE_HINTS = ['alex','daniel','tom','aaron','evan','jamie','noah','rishi','david','mark','eric','george','guy','william','male'];

function detectGender(name){const n=name.toLowerCase();if(FEMALE_HINTS.some(h=>n.includes(h)))return'F';if(MALE_HINTS.some(h=>n.includes(h)))return'M';return''}
function isGoodVoice(name){const n=name.toLowerCase();if(BAD_VOICES.some(b=>n.includes(b)))return false;return GOOD_VOICES.some(g=>n.includes(g))}

let allVoices=[];
function loadVoices(){
  const all = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const filtered = all.filter(v => isGoodVoice(v.name));
  allVoices = filtered.length ? filtered : all;
  renderVoiceOptions();
}
function renderVoiceOptions(){
  const sel = document.getElementById('voiceSelect');
  if (!allVoices.length) { sel.innerHTML = '<option>Loading...</option>'; return; }
  const groups = {};
  allVoices.forEach(v => { (groups[v.lang] ||= []).push(v); });
  const sortedLangs = Object.keys(groups).sort((a,b)=>{
    const order = ['en-US','en-GB','en-AU','en-CA','en-IN','en-IE','en-NZ','en-ZA'];
    return (order.indexOf(a) - order.indexOf(b)) || a.localeCompare(b);
  });
  let html = '';
  for (const lang of sortedLangs) {
    const label = ACCENT_LABELS[lang] || lang;
    html += `<optgroup label="${label}">`;
    for (const v of groups[lang]) {
      const gender = detectGender(v.name);
      const tag = gender ? ` · ${gender}` : '';
      html += `<option value="${v.name}">${v.name}${tag}</option>`;
    }
    html += '</optgroup>';
  }
  sel.innerHTML = html;
  const saved = localStorage.getItem('rl_voice');
  if (saved && allVoices.some(v => v.name === saved)) sel.value = saved;
}
function onVoiceChange(){
  localStorage.setItem('rl_voice', document.getElementById('voiceSelect').value);
  speak('Hello, this is how I sound.');
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, rate=0.95){
  const u = new SpeechSynthesisUtterance(text);
  const selected = document.getElementById('voiceSelect').value;
  const voice = allVoices.find(v => v.name === selected);
  if (voice) { u.voice = voice; u.lang = voice.lang; }
  else u.lang = 'en-US';
  u.rate = rate;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// Save
function saveSentenceFromHistory(id){
  const hist = loadHistory();
  const item = hist.find(h => h.id === id);
  if (!item) return;
  const arr = loadSentences();
  if (arr.some(x => x.zh === item.zh && x.en === item.en)) {
    toast('Already in your sentence vault');
    return;
  }
  arr.unshift({id:Date.now(), zh:item.zh, en:item.en, ipa:item.ipa, category:item.category||selectedCategory, savedAt:new Date().toISOString()});
  saveSentencesArr(arr);
  item.isSaved = true;
  saveHistoryArr(hist);
  renderMain();
  renderHistory();
  renderSentences();
  renderFilterTabs();
  updateBadges();
  toast(`Saved to ${getCategory(item.category||selectedCategory).label}`);
}
function deleteSentence(id){
  saveSentencesArr(loadSentences().filter(x=>x.id!==id));
  renderSentences();
  renderFilterTabs();
  updateBadges();
}
function saveCurrentWord(){
  if (!currentWordData || !currentWordData.word) return;
  const arr = loadWords();
  if (arr.some(w => w.word === currentWordData.word)) {
    toast('Already in your word vault');
    hideWordPopup();
    return;
  }
  arr.unshift({id:Date.now(), word:currentWordData.word, ipa:currentWordData.ipa, pos:currentWordData.pos, zh:currentWordData.zh, savedAt:new Date().toISOString()});
  saveWordsArr(arr);
  renderWords();
  updateBadges();
  toast('Saved to words');
  hideWordPopup();
}
function deleteWord(id){saveWordsArr(loadWords().filter(x=>x.id!==id));renderWords();updateBadges()}
function deleteHistory(id){
  saveHistoryArr(loadHistory().filter(x=>x.id!==id));

    <div class="feed-card">

        ${x.isSaved?'<span class="dot"></span><span style="color:#10B981;font-weight:600"><i data-lucide="check" style="width:11px;height:11px;display:inline-block;vertical-align:-1px"></i> Saved</span>':''}

        <button class="btn ${x.isSaved?'saved':''}" onclick="${x.isSaved?'':"saveSentenceFromHistory("+x.id+")"}">
          <span class="icon"><i data-lucide="${x.isSaved?'check':'bookmark-plus'}"></i></span>
          <span>${x.isSaved?'Saved':'Save'}</span>
        </button>
        <span class="spacer"></span>
        <button class="icon-btn danger" title="Remove" onclick="if(confirm('Remove?')) deleteHistory(${x.id})"><i data-lucide="x"></i></button>

function renderHistory(){
  const all = loadHistory();
  document.getElementById('historyCount').textContent = all.length;
  const c = document.getElementById('historyList');
  if (!all.length) {
    c.innerHTML = `<div class="empty-state"><div class="icon-wrap"><i data-lucide="history"></i></div><div class="title">沒有歷史紀錄</div><div class="desc">每次翻譯都會自動加進這裡</div></div>`;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }
  const groups = [
    {label:'Today', sub:'今天', items: all.filter(x=>isToday(x.savedAt))},
    {label:'Yesterday', sub:'昨天', items: all.filter(x=>isYesterday(x.savedAt))},
    {label:'This week', sub:'本週稍早', items: all.filter(x=>isThisWeek(x.savedAt))},
    {label:'Earlier', sub:'更早之前', items: all.filter(x=>isEarlier(x.savedAt))},
  ].filter(g => g.items.length);
  c.innerHTML = groups.map(g => `
    <div class="history-group">
      <div class="history-group-label">${g.label} <span class="sub">${g.sub} · ${g.items.length}</span></div>
      <div class="feed">${g.items.map(x => renderHistoryItem(x, g.label !== 'Today')).join('')}</div>

  `).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// 路由
function navigate(view){location.hash = view}
function renderView(){
  const view = (location.hash || '#main').slice(1) || 'main';
  document.querySelectorAll('[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  document.getElementById('navHome').classList.toggle('active', view === 'main');
  document.getElementById('navHistory').classList.toggle('active', view === 'history');
  document.getElementById('navSentence').classList.toggle('active', view === 'sentences');
  document.getElementById('navWord').classList.toggle('active', view === 'words');
  // bottom-bar 只在 main view 顯示
  document.getElementById('bottomBar').classList.toggle('hidden', view !== 'main');
  window.scrollTo({top:0, behavior:'smooth'});
  if (view === 'main') renderMain();
  if (view === 'history') renderHistory();
  if (view === 'sentences') { renderSentences(); renderFilterTabs(); }
  if (view === 'words') renderWords();
}

  document.getElementById('toastText').textContent = msg;
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g, "\\'")}
